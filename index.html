<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Battle</title>
  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    nav {
      background-color: #1f2937;
      color: white;
      padding: 1rem;
      margin-bottom: 2rem;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-right: 2rem;
      cursor: pointer;
    }
    nav a:hover {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Navigation Component
    function Navigation({ currentPage, setCurrentPage }) {
      return (
        <nav>
          <div className="container flex">
            <a onClick={() => setCurrentPage('home')} style={{ fontWeight: currentPage === 'home' ? 'bold' : 'normal' }}>Home</a>
            <a onClick={() => setCurrentPage('battle')} style={{ fontWeight: currentPage === 'battle' ? 'bold' : 'normal' }}>Battle</a>
            <a onClick={() => setCurrentPage('practice')} style={{ fontWeight: currentPage === 'practice' ? 'bold' : 'normal' }}>Practice</a>
            <a onClick={() => setCurrentPage('leaderboard')} style={{ fontWeight: currentPage === 'leaderboard' ? 'bold' : 'normal' }}>Leaderboard</a>
            <a onClick={() => setCurrentPage('dashboard')} style={{ fontWeight: currentPage === 'dashboard' ? 'bold' : 'normal' }}>Dashboard</a>
          </div>
        </nav>
      );
    }

    // Home Page
    function Home({ setCurrentPage }) {
      return (
        <div className="p-6 container">
          <h1 className="text-4xl font-bold mb-6">⚔️ Code Battle</h1>
          <p className="text-lg text-gray-600 mb-8">Compete in real-time coding challenges against other developers!</p>
          <div className="flex gap-4">
            <button 
              onClick={() => setCurrentPage('battle')}
              className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 text-lg"
            >
              Start Battle
            </button>
            <button 
              onClick={() => setCurrentPage('practice')}
              className="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 text-lg"
            >
              Practice
            </button>
          </div>
        </div>
      );
    }

    // Battle Page
    function Battle() {
      const [code, setCode] = useState("// Start coding...");
      const [status, setStatus] = useState("Waiting for opponent...");
      const [opponent, setOpponent] = useState(null);
      const [output, setOutput] = useState("Execution output will appear here...");
      const [timeLeft, setTimeLeft] = useState(300);

      useEffect(() => {
        // Simulate countdown timer
        const timer = setInterval(() => {
          setTimeLeft((prev) => (prev > 0 ? prev - 1 : 0));
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        // Simulate finding opponent after 3 seconds
        const timeout = setTimeout(() => {
          if (!opponent) {
            setOpponent("Player_" + Math.floor(Math.random() * 9000 + 1000));
            setStatus("Match found! Battle started ⚔️");
          }
        }, 3000);
        return () => clearTimeout(timeout);
      }, [opponent]);

      const submitCode = () => {
        setStatus("Code submitted...");
        setOutput("✓ All test cases passed!");
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      return (
        <div className="p-6 container">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-3xl font-semibold">⚔️ Live Battle</h2>
            <div className="text-2xl font-bold text-red-600">⏳ {formatTime(timeLeft)}</div>
          </div>

          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="bg-blue-100 p-4 rounded-lg border-2 border-blue-500">
              <p className="font-bold text-lg">You (Player)</p>
              <p className="text-gray-600">Score: 0</p>
            </div>
            <div className="bg-red-100 p-4 rounded-lg border-2 border-red-500 text-right">
              <p className="font-bold text-lg">{opponent || "Searching..."}</p>
              <p className="text-gray-600">Score: 0</p>
            </div>
          </div>

          <div className="mb-6">
            <label className="block font-semibold mb-2">JavaScript Code Editor:</label>
            <textarea
              value={code}
              onChange={(e) => setCode(e.target.value)}
              className="w-full h-64 border-2 border-gray-300 p-4 rounded font-mono text-sm"
              style={{ fontFamily: 'Monaco, Courier New, monospace' }}
            />
          </div>

          <div className="flex gap-4 mb-6">
            <button
              onClick={submitCode}
              className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold"
            >
              Submit Code
            </button>
            <div className="text-gray-700 font-semibold">{status}</div>
          </div>

          <div className="bg-black text-green-400 p-4 rounded h-40 overflow-auto font-mono text-sm border-2 border-gray-700">
            <p>{output}</p>
          </div>
        </div>
      );
    }

    // Practice Page
    function Practice() {
      const [code, setCode] = useState("// Write your solution here");
      
      return (
        <div className="p-6 container">
          <h2 className="text-3xl font-semibold mb-4">📝 Practice Mode</h2>
          <div className="mb-4">
            <h3 className="text-xl font-bold mb-2">Problem: Sum of Two Numbers</h3>
            <p className="text-gray-600 mb-4">Write a function that returns the sum of two numbers.</p>
          </div>
          <label className="block font-semibold mb-2">Your Solution:</label>
          <textarea
            value={code}
            onChange={(e) => setCode(e.target.value)}
            className="w-full h-64 border-2 border-gray-300 p-4 rounded font-mono mb-4"
            style={{ fontFamily: 'Monaco, Courier New, monospace' }}
          />
          <button className="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 font-semibold">
            Run Code
          </button>
        </div>
      );
    }

    // Leaderboard Page
    function Leaderboard() {
      const [users] = useState([
        { name: "CodeMaster", rating: 2150, wins: 45 },
        { name: "AlgoKing", rating: 2010, wins: 42 },
        { name: "ByteNinja", rating: 1890, wins: 38 },
        { name: "DebugGuru", rating: 1750, wins: 35 },
        { name: "You", rating: 1500, wins: 20 }
      ]);

      return (
        <div className="p-6 container">
          <h2 className="text-3xl font-semibold mb-6">🏆 Leaderboard</h2>
          <div className="bg-white border-2 border-gray-300 rounded-lg overflow-hidden">
            <table className="w-full">
              <thead className="bg-gray-200">
                <tr>
                  <th className="p-4 text-left">Rank</th>
                  <th className="p-4 text-left">Player</th>
                  <th className="p-4 text-center">Rating</th>
                  <th className="p-4 text-center">Wins</th>
                </tr>
              </thead>
              <tbody>
                {users.map((user, idx) => (
                  <tr key={idx} className={idx % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                    <td className="p-4 font-bold text-lg">{idx + 1}</td>
                    <td className="p-4 font-semibold">{user.name}</td>
                    <td className="p-4 text-center text-blue-600 font-bold">{user.rating}</td>
                    <td className="p-4 text-center">{user.wins}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // Dashboard Page
    function Dashboard() {
      return (
        <div className="p-6 container">
          <h2 className="text-3xl font-semibold mb-6">📊 Performance Dashboard</h2>
          <div className="grid grid-cols-3 gap-4 mb-6">
            <div className="bg-blue-100 p-6 rounded-lg border-2 border-blue-500">
              <p className="text-gray-600 font-semibold">Total Battles</p>
              <p className="text-4xl font-bold text-blue-600">24</p>
            </div>
            <div className="bg-green-100 p-6 rounded-lg border-2 border-green-500">
              <p className="text-gray-600 font-semibold">Win Rate</p>
              <p className="text-4xl font-bold text-green-600">75%</p>
            </div>
            <div className="bg-purple-100 p-6 rounded-lg border-2 border-purple-500">
              <p className="text-gray-600 font-semibold">Current Rating</p>
              <p className="text-4xl font-bold text-purple-600">1500</p>
            </div>
          </div>
          <div className="bg-gray-100 p-6 rounded-lg border-2 border-gray-300">
            <p className="text-gray-600">📈 Detailed statistics and charts coming soon...</p>
          </div>
        </div>
      );
    }

    // Main App Component
    function App() {
      const [currentPage, setCurrentPage] = useState('home');

      return (
        <div className="min-h-screen bg-gray-50">
          <Navigation currentPage={currentPage} setCurrentPage={setCurrentPage} />
          
          {currentPage === 'home' && <Home setCurrentPage={setCurrentPage} />}
          {currentPage === 'battle' && <Battle />}
          {currentPage === 'practice' && <Practice />}
          {currentPage === 'leaderboard' && <Leaderboard />}
          {currentPage === 'dashboard' && <Dashboard />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
